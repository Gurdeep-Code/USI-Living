[build]
  publish = "dist"
  command = "npm run build"

[[redirects]]
  from = "/"
  to = "/modular-kitchen-wardrobe-chat"
  status = 301

[[redirects]]
  from = "/modular-kitchen-wardrobe-chat/assets/*"
  to = "/assets/:splat"
  status = 200

[[redirects]]
  from = "/modular-kitchen-wardrobe-chat/*"
  to = "/index.html"
  status = 200
